apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: todolist-hpa
  namespace: todolist-grupo-02
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: todolist-deployment
  minReplicas: 1
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
